name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:${{ github.workspace }}/packages/db/prisma/dev.db
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Setup database
        run: pnpm --filter @ai-analyzer/db run push
        env:
          DATABASE_URL: file:./prisma/dev.db

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
